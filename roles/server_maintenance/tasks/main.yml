---
# ============================================
# MISE A JOUR DU CACHE
# ============================================
- name: "[Common] Mise a jour du cache APT (Debian/Ubuntu)"
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"

- name: "[Common] Mise a jour du cache DNF (RedHat/Rocky)"
  ansible.builtin.dnf:
    update_cache: yes
  when: ansible_os_family == "RedHat"

# ============================================
# EPEL - DOIT ETRE AVANT LES PAQUETS (Rocky)
# ============================================
- name: "[Monitoring] Installation EPEL repo (RedHat/Rocky)"
  ansible.builtin.dnf:
    name: epel-release
    state: present
  when: ansible_os_family == "RedHat"

# ============================================
# PAQUETS DE BASE
# ============================================
- name: "[Base] Installation des paquets de base (Debian/Ubuntu)"
  ansible.builtin.apt:
    name:
      - vim
      - htop
      - curl
      - wget
      - net-tools
      - tree
    state: present
  when: ansible_os_family == "Debian"

- name: "[Base] Installation des paquets de base (RedHat/Rocky)"
  ansible.builtin.dnf:
    name:
      - vim
      - htop
      - wget
      - net-tools
      - tree
      - procps-ng
    state: present
    allowerasing: yes
  when: ansible_os_family == "RedHat"

# ============================================
# MONITORING
# ============================================
- name: "[Monitoring] Installation des outils de monitoring (Debian/Ubuntu)"
  ansible.builtin.apt:
    name:
      - sysstat
      - iotop
      - nmon
    state: present
  when: ansible_os_family == "Debian"

- name: "[Monitoring] Installation des outils de monitoring (RedHat/Rocky)"
  ansible.builtin.dnf:
    name:
      - sysstat
      - iotop
    state: present
  when: ansible_os_family == "RedHat"

# ============================================
# BANNIERE SSH
# ============================================
- name: "[SSH] Deploiement de la banniere SSH"
  ansible.builtin.template:
    src: banner.j2
    dest: "{{ ssh_banner_file }}"
    owner: root
    group: root
    mode: '0644'
  when: ssh_banner_enabled | bool

- name: "[SSH] Activation de la banniere dans sshd_config"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Banner'
    line: "Banner {{ ssh_banner_file }}"
    state: present
  when: ssh_banner_enabled | bool
  notify: restart sshd

# ============================================
# DETECTION SYSTEMD
# ============================================
- name: "[System] Verifier si systemd est actif"
  ansible.builtin.command: ps -p 1 -o comm=
  register: init_system
  changed_when: false
  ignore_errors: true

# ============================================
# SERVICES (uniquement si systemd)
# ============================================
- name: "[Service] Activation de sysstat"
  ansible.builtin.systemd:
    name: sysstat
    state: started
    enabled: yes
  when: init_system.stdout | default('') == 'systemd'
  ignore_errors: yes

- name: "[Service] Activation de Chrony (RedHat)"
  ansible.builtin.systemd:
    name: chronyd
    state: started
    enabled: yes
  when:
    - ansible_os_family == "RedHat"
    - init_system.stdout | default('') == 'systemd'

# ============================================
# RESUME
# ============================================
- name: "[Info] Resume de la maintenance"
  ansible.builtin.debug:
    msg: |
      ========================================
      Maintenance terminee sur {{ inventory_hostname }}
      OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
      Famille: {{ ansible_os_family }}
      Banniere SSH: {{ 'Activee' if ssh_banner_enabled else 'Desactivee' }}
      Systemd: {{ 'Oui' if init_system.stdout | default('') == 'systemd' else 'Non (conteneur)' }}
      ========================================
